<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Password</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 320px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 24px;
            text-align: center;
            color: #333;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.25);
        }

        .buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 12px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .btn-cancel {
            background-color: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background-color: #e0e0e0;
        }

        .btn-submit {
            background-color: #007bff;
            color: white;
        }

        .btn-submit:hover {
            background-color: #0069d9;
        }

        .error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Set Password</h2>
        <div class="form-group">
            <label for="password">New Password</label>
            <input type="password" id="password" required placeholder="Enter password">
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" required placeholder="Confirm password">
            <div id="error-msg" class="error">Passwords do not match</div>
        </div>
        <div class="buttons">
            <button class="btn-cancel" onclick="cancel()">Cancel</button>
            <button class="btn-submit" onclick="submit()">Submit</button>
        </div>
    </div>

    <script>
        // Listen for Enter key to submit
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Enter') {
                submit();
            } else if (event.key === 'Escape') {
                cancel();
            }
        });

        function cancel() {
            window.parent.postMessage({ type: 'canceled' }, '*');
        }

        function submit() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('error-msg');

            // Reset error
            errorMsg.style.display = 'none';

            if (!password) {
                errorMsg.textContent = "Password is required";
                errorMsg.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match";
                errorMsg.style.display = 'block';
                return;
            }

            // Post message to parent with the payload
            window.parent.postMessage({
                type: 'submitted',
                payload: { password: password }
            }, '*');
        }
    </script>
</body>

</html>
